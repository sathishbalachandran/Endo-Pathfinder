<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endo Path Finder | FIGO 2023</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FBFBFD; color: #1D1D1F; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [formData, setFormData] = useState({
                histology: '', grade: '', myoInvasion: '', lvsi: '', 
                cervicalStroma: false, adnexa: false, nodes: 'none'
            });

            // --- FIGO 2023 CLINICAL LOGIC ---
            const calculateStage = useMemo(() => {
                const { histology, grade, myoInvasion, lvsi, cervicalStroma, adnexa, nodes } = formData;
                if (nodes === 'para-aortic') return "IIIC2";
                if (nodes === 'pelvic') return "IIIC1";
                if (adnexa) return "IIIA";
                if (lvsi === 'substantial') return "IIB";
                if (cervicalStroma) return "IIA";
                const isAggressive = ['serous', 'clear-cell', 'carcinosarcoma'].includes(histology) || (histology === 'endometrioid' && grade === '3');
                if (isAggressive && myoInvasion !== 'none') return "IIC";
                return myoInvasion === '>=50' ? "IB" : "IA";
            }, [formData]);

            const Selector = ({ label, field, options, color = "bg-indigo-600" }) => (
                <div className="mb-6">
                    <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">{label}</label>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                        {options.map(opt => (
                            <button 
                                key={opt.id} 
                                onClick={() => setFormData(p => ({...p, [field]: opt.id}))}
                                className={`p-4 rounded-2xl border-2 transition-all text-sm font-bold ${formData[field] === opt.id ? `${color} border-transparent text-white shadow-lg` : 'bg-white border-slate-100 text-slate-600 hover:border-slate-200'}`}
                            >
                                {opt.label}
                            </button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto bg-white rounded-[40px] shadow-2xl border border-slate-50 overflow-hidden">
                        {/* Header */}
                        <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                            <h1 className="text-xl font-black tracking-tighter">Endo <span className="text-indigo-400">Path Finder</span></h1>
                            <span className="text-[10px] font-bold bg-white/10 px-3 py-1 rounded-full border border-white/20 uppercase tracking-widest">FIGO 2023 Validated</span>
                        </div>

                        {/* Disclaimer Banner */}
                        <div className="p-4 bg-rose-50 border-b border-rose-100 flex gap-3 items-start">
                            <div className="bg-rose-500 p-1.5 rounded-lg text-white mt-1"><i data-lucide="shield-alert" style={{width:16, height:16}}></i></div>
                            <div>
                                <h4 className="text-[10px] font-black text-rose-900 uppercase tracking-widest">Clinical Disclaimer</h4>
                                <p className="text-[11px] text-rose-800 font-medium italic leading-relaxed">
                                    For professional use by oncologists only. Not a substitute for MDT review or institutional protocols.
                                </p>
                            </div>
                        </div>

                        {/* Input Section */}
                        <div className="p-6 md:p-10">
                            <Selector label="Histological Type" field="histology" options={[{id:'endometrioid', label:'Endometrioid'}, {id:'serous', label:'Serous'}, {id:'clear-cell', label:'Clear Cell'}, {id:'carcinosarcoma', label:'Carcinosarcoma'}]} />
                            <Selector label="FIGO Grade" field="grade" options={[{id:'1', label:'Grade 1'}, {id:'2', label:'Grade 2'}, {id:'3', label:'Grade 3'}]} color="bg-amber-500" />
                            <Selector label="Invasion (MI)" field="myoInvasion" options={[{id:'none', label:'None'}, {id:'<50', label:'< 50%'}, {id:'>=50', label:'≥ 50%'}]} color="bg-rose-500" />
                            
                            {/* Result Section */}
                            <div className="mt-10 p-10 bg-slate-900 rounded-[32px] text-white relative">
                                <p className="text-indigo-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1">FINAL STAGE</p>
                                <h2 className="text-6xl font-black tracking-tighter">{calculateStage}</h2>
                            </div>
                        </div>

                        {/* Institutional Credit */}
                        <footer className="p-6 bg-slate-50 text-center border-t">
                             <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Consultant Radiation Oncologist | Kauvery Cancer Institute, Trichy</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // Run Lucide Icons after the page loads
        setTimeout(() => lucide.createIcons(), 200);
    </script>
</body>
</html>
