<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endometrial Path Finder | Integrated FIGO 2023 & PORTEC-4a</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-rose-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const initialFormData = {
                histology: '', grade: '', myoInvasion: '', lvsi: '', cervicalStroma: false,
                vaginaParametrium: false, adnexa: false, peritoneum: false, nodes: 'none', 
                molecular: 'unknown', ctnnb1: 'wt', l1cam: 'neg', erStatus: 'pos',
            };

            const [formData, setFormData] = useState(initialFormData);
            const [activeStep, setActiveStep] = useState(0);

            const calculateStage = useMemo(() => {
                const { histology, grade, myoInvasion, lvsi, cervicalStroma, vaginaParametrium, adnexa, peritoneum, nodes, molecular } = formData;
                if (peritoneum) return "IVB";
                if (nodes === 'para-aortic') return "IIIC2";
                if (nodes === 'pelvic') return "IIIC1";
                if (vaginaParametrium) return "IIIB";
                if (adnexa) return "IIIA";
                if (lvsi === 'substantial') return "IIB"; 
                if (cervicalStroma) return "IIA";
                const isAggressiveType = ['serous', 'clear-cell', 'carcinosarcoma', 'undifferentiated'].includes(histology);
                const isG3Endo = histology === 'endometrioid' && grade === '3';
                const hasAnyInvasion = myoInvasion === '<50' || myoInvasion === '>=50';
                if ((isAggressiveType || isG3Endo) && hasAnyInvasion) return "IIC"; 
                if (molecular === 'pole' && !adnexa && nodes === 'none' && !vaginaParametrium && !peritoneum) return "IAm (POLEmut)";
                return myoInvasion === '>=50' ? "IB" : "IA";
            }, [formData]);

            const riskAnalysis = useMemo(() => {
                const stage = calculateStage;
                const { grade, lvsi, molecular, myoInvasion, ctnnb1, l1cam, erStatus } = formData;
                const isStageIII = stage.startsWith("IIIA") || stage.startsWith("IIIB") || stage.startsWith("IIIC");
                const isStageIV = stage.startsWith("IV");

                if (isStageIII || isStageIV) return { group: "High Risk (Stage III/IV)", treatment: "EBRT + Systemic Chemotherapy", color: 'bg-rose-600' };
                if (l1cam === 'pos' && myoInvasion !== 'none') return { group: "High Risk (L1CAM+)", treatment: "Chemotherapy + EBRT", color: 'bg-rose-600' };
                if (molecular === 'nsmp' && erStatus === 'neg' && myoInvasion !== 'none') return { group: "High Risk (ER-neg NSMP)", treatment: "Chemotherapy + EBRT", color: 'bg-rose-600' };
                if (molecular === 'pole') return { group: "Low Risk (POLEmut)", treatment: "Observation", color: 'bg-emerald-500' };
                if (molecular === 'p53abn' && myoInvasion !== 'none') return { group: "High Risk (p53abn)", treatment: "Chemo + EBRT", color: 'bg-rose-600' };
                if (stage === "IIC") return { group: "High Risk", treatment: "EBRT + Systemic Chemotherapy", color: 'bg-rose-600' };
                if (molecular === 'nsmp' && ctnnb1 === 'mut' && stage === "IA" && grade !== "3") return { group: "Intermediate Risk (CTNNB1 mut)", treatment: "Vaginal Brachytherapy (VBT)", color: 'bg-amber-400' };
                if (stage.startsWith("II") || (stage === "IB" && (lvsi === 'substantial' || grade === '3'))) return { group: "High-Intermediate", treatment: "EBRT", color: 'bg-orange-500' };
                if ((stage === "IA" && grade === '3') || (stage === "IB" && grade !== '3')) return { group: "Intermediate Risk", treatment: "Vaginal Brachytherapy (VBT)", color: 'bg-amber-400' };
                return { group: "Low Risk", treatment: "Observation", color: 'bg-emerald-500' };
            }, [calculateStage, formData]);

            const handleDownloadPDF = () => {
                const element = document.getElementById('pdf-content');
                const opt = {
                    margin: 0.5,
                    filename: `EndoPath_Plan_${new Date().toLocaleDateString()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                html2pdf().from(element).save();
            };

            const Selector = ({ label, options, value, onChange, grid = "grid-cols-2", activeColor = "bg-indigo-600" }) => (
                <div className="mb-6">
                    <label className="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">{label}</label>
                    <div className={`grid ${grid} gap-3`}>
                        {options.map(opt => (
                            <button key={opt.id} onClick={() => onChange(opt.id)} className={`p-4 text-sm rounded-2xl border-2 text-left transition-all duration-300 ${value === opt.id ? `${activeColor} border-transparent text-white shadow-xl translate-y-[-2px]` : 'bg-white border-slate-100 text-slate-600 hover:border-indigo-200 hover:bg-indigo-50/30'}`}>
                                <div className="font-bold mb-0.5">{opt.label}</div>
                                {opt.desc && <div className={`text-[10px] leading-tight ${value === opt.id ? 'text-indigo-100 opacity-90' : 'text-slate-400'}`}>{opt.desc}</div>}
                            </button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen text-slate-900 pb-20">
                    <nav className="bg-white/70 backdrop-blur-md border-b sticky top-0 z-50 px-6 h-20 flex items-center justify-between no-print">
                        <div className="flex items-center gap-3">
                            <div className="bg-gradient-to-br from-indigo-600 to-violet-700 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200"><Icon name="activity" /></div>
                            <div>
                                <span className="font-black text-xl tracking-tighter">Endometrial <span className="text-indigo-600">Path Finder</span></span>
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kauvery Cancer Institute, Trichy</div>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={handleDownloadPDF} className="flex items-center gap-2 px-5 py-2.5 text-xs font-black text-white bg-indigo-600 hover:bg-indigo-700 rounded-2xl transition-all shadow-md"><Icon name="download" size={16} /> SAVE PDF</button>
                            <button onClick={() => setFormData(initialFormData)} className="flex items-center gap-2 px-5 py-2.5 text-xs font-black text-slate-500 hover:text-rose-600 hover:bg-rose-50 rounded-2xl transition-all border border-slate-100 bg-white"><Icon name="refresh-ccw" size={16} /> RESET</button>
                        </div>
                    </nav>

                    <main id="pdf-content" className="max-w-6xl mx-auto p-6 md:p-10">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div className="lg:col-span-7 no-print">
                                <div className="bg-white/80 backdrop-blur-sm rounded-[40px] shadow-2xl border border-white p-8 md:p-10">
                                    <div className="flex justify-between items-center mb-10">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-indigo-100 text-indigo-600 p-3 rounded-2xl">
                                                {activeStep === 0 ? <Icon name="microscope" /> : activeStep === 1 ? <Icon name="stethoscope" /> : <Icon name="fingerprint" />}
                                            </div>
                                            <div><h2 className="text-2xl font-black text-slate-800">{activeStep === 0 ? 'Tumor Profile' : activeStep === 1 ? 'Anatomy & Spread' : 'Molecular & IHC'}</h2><p className="text-slate-400 text-sm font-medium">Precision Oncology Data</p></div>
                                        </div>
                                        <div className="flex gap-2">{[0, 1, 2].map(i => <div key={i} className={`h-2 w-10 rounded-full transition-all duration-500 ${activeStep === i ? 'bg-indigo-600' : 'bg-slate-100'}`} />)}</div>
                                    </div>

                                    {activeStep === 0 && (
                                        <div className="animate-in">
                                            <Selector label="Histological Type" value={formData.histology} onChange={(v) => setFormData(p => ({...p, histology: v}))} options={[{id:'endometrioid', label:'Endometrioid'},{id:'serous', label:'Serous'},{id:'clear-cell', label:'Clear Cell'},{id:'carcinosarcoma', label:'Carcinosarcoma'}]}/>
                                            <Selector label="FIGO Grade" value={formData.grade} onChange={(v) => setFormData(p => ({...p, grade: v}))} options={[{id:'1',label:'Grade 1'},{id:'2',label:'Grade 2'},{id:'3',label:'Grade 3'}]} grid="grid-cols-3" activeColor="bg-amber-500"/>
                                            <button onClick={() => setActiveStep(1)} className="w-full bg-slate-900 text-white p-5 rounded-3xl font-black shadow-xl mt-4 flex items-center justify-center gap-2">CONTINUE <Icon name="arrow-right" size={20} /></button>
                                        </div>
                                    )}

                                    {activeStep === 1 && (
                                        <div className="animate-in">
                                            <Selector label="Myometrial Invasion (MI)" value={formData.myoInvasion} onChange={(v) => setFormData(p => ({...p, myoInvasion: v}))} options={[{id:'none',label:'No Invasion'},{id:'<50',label:'Invasion < 50%'},{id:'>=50',label:'Invasion ≥ 50%'}]} grid="grid-cols-3" activeColor="bg-rose-500"/>
                                            <div className="grid grid-cols-2 gap-3 mb-6">
                                                {[{id: 'lvsi', label: 'Substantial LVSI'}, {id: 'cervicalStroma', label: 'Cervical Stroma'}, {id: 'adnexa', label: 'Adnexal Met'}, {id: 'vaginaParametrium', label: 'Vagina/Spread'}].map(item => (
                                                    <button key={item.id} onClick={() => item.id === 'lvsi' ? setFormData(p => ({...p, lvsi: p.lvsi === 'substantial' ? 'none' : 'substantial'})) : setFormData(p => ({...p, [item.id]: !p[item.id]}))} className={`p-4 text-[11px] font-black rounded-2xl border-2 transition-all flex items-center justify-between ${ (item.id === 'lvsi' ? formData.lvsi === 'substantial' : formData[item.id]) ? 'bg-rose-50 border-rose-400 text-rose-700 shadow-sm' : 'bg-white border-slate-100 text-slate-400'}`}>{item.label.toUpperCase()}{(item.id === 'lvsi' ? formData.lvsi === 'substantial' : formData[item.id]) && <Icon name="check-circle-2" size={14} className="text-rose-600" />}</button>
                                                ))}
                                            </div>
                                            <Selector label="Lymph Nodes" value={formData.nodes} onChange={(v) => setFormData(p => ({...p, nodes: v}))} options={[{id:'none',label:'Negative'},{id:'pelvic',label:'Pelvic (+)'},{id:'para-aortic',label:'Para-aortic (+)'}]} grid="grid-cols-3" activeColor="bg-indigo-800"/>
                                            <div className="flex gap-4"><button onClick={() => setActiveStep(0)} className="flex-1 bg-slate-100 text-slate-500 p-5 rounded-3xl font-black">BACK</button><button onClick={() => setActiveStep(2)} className="flex-1 bg-slate-900 text-white p-5 rounded-3xl font-black">NEXT: MOLECULAR</button></div>
                                        </div>
                                    )}

                                    {activeStep === 2 && (
                                        <div className="animate-in space-y-8">
                                            <Selector label="Molecular Type" value={formData.molecular} onChange={(v) => setFormData(p => ({...p, molecular: v}))} options={[{id:'pole', label:'POLEmut'},{id:'mmrd', label:'MMRd'},{id:'nsmp', label:'NSMP'},{id:'p53abn', label:'p53abn'},{id:'unknown', label:'Unknown'}]}/>
                                            <div className="flex gap-4"><button onClick={() => setActiveStep(1)} className="flex-1 bg-slate-100 text-slate-500 p-5 rounded-3xl font-black">BACK</button><button onClick={() => setActiveStep(0)} className="flex-1 bg-indigo-600 text-white p-5 rounded-3xl font-black shadow-xl">GENERATE PLAN</button></div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="lg:col-span-5 space-y-8 print:w-full">
                                <div className="bg-slate-900 rounded-[40px] p-8 text-white shadow-2xl relative overflow-hidden">
                                    <div className="flex justify-between items-start mb-8 relative z-10">
                                        <div><h3 className="text-indigo-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1">FINAL STAGE</h3><p className="text-5xl font-black tracking-tighter">{calculateStage}</p></div>
                                        <div className="bg-indigo-600/20 px-4 py-2 rounded-2xl text-[10px] font-black border border-indigo-500/30">FIGO 2023</div>
                                    </div>
                                    <div className="space-y-6 relative z-10">
                                        <div className="bg-white/5 border border-white/10 p-6 rounded-3xl backdrop-blur-sm"><span className="text-slate-400 text-[10px] font-black uppercase tracking-widest block mb-2">RISK GROUP</span><div className="flex items-center gap-3"><div className={`w-4 h-4 rounded-full ${riskAnalysis.color}`}></div><span className="text-xl font-black">{riskAnalysis.group}</span></div></div>
                                        <div className="bg-gradient-to-br from-indigo-500 to-violet-700 p-8 rounded-[32px] shadow-2xl border border-white/20"><span className="text-indigo-100 text-[10px] font-black uppercase tracking-widest block mb-2 opacity-80">ADJUVANT PLAN</span><span className="text-2xl font-black block leading-tight">{riskAnalysis.treatment}</span></div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[40px] p-8 border border-white shadow-xl">
                                    <div className="flex items-center gap-3 mb-6"><div className="p-2 bg-rose-100 text-rose-600 rounded-xl"><Icon name="book-open" size={20}/></div><span className="font-black text-slate-800 tracking-tight uppercase text-xs">Clinical Summary</span></div>
                                    <div className="space-y-4 text-[10px] leading-relaxed">
                                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between"><span>Molecular Profile</span><span className="font-black uppercase">{formData.molecular}</span></div>
                                        <div className="p-4 bg-amber-50 rounded-2xl border border-amber-100 flex gap-3 text-amber-800">
                                            <Icon name="alert-triangle" size={16} />
                                            <p className="font-bold">Calculated per Kauvery Cancer Institute, Trichy Oncology Protocol & FIGO 2023 guidelines.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-white/60 backdrop-blur-xl border-t p-4 text-center z-40 no-print">
                        <div className="max-w-7xl mx-auto flex justify-center items-center gap-6">
                            <span className="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em]">Kauvery Cancer Institute, Trichy</span>
                            <span className="text-[9px] font-black text-indigo-500 uppercase tracking-[0.3em]">FIGO 2023 Validated</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 300);
    </script>
</body>
</html>
